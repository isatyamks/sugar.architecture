version: "3.8"

services:
  reflection-api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./model_versions:/app/model_versions:ro
      - reflection-data:/app/data
    restart: unless-stopped
  # Optional: Ollama sidecar for local LLM inference
  # Uncomment to use Ollama as the LLM provider
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-models:/root/.ollama
  #   restart: unless-stopped

volumes:
  reflection-data: # ollama-models:
